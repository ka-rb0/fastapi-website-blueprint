# Keeps every pinned version from silently aging - one entry per lock point:
# GitHub Actions (SHA-pinned in ci.yml), python packages (uv.lock), npm lint
# tools (package-lock.json), and the Docker images pulled in 01_base (python,
# uv) and 02_dev (node). The other Dockerfiles build FROM local images, so
# there is nothing there to bump; the agent CLIs in 03_agent float by design
# (installer scripts, no lockfile).
#
# `groups` batches each ecosystem's minor + patch bumps into one weekly PR;
# major bumps stay individual PRs so breaking changes get reviewed alone.
version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions-minor-and-patch:
        update-types: [minor, patch]
  - package-ecosystem: uv
    directory: /
    schedule:
      interval: weekly
    groups:
      python-minor-and-patch:
        update-types: [minor, patch]
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    groups:
      npm-minor-and-patch:
        update-types: [minor, patch]
  - package-ecosystem: docker
    directories:
      - /.devcontainer/docker_files/01_base
      - /.devcontainer/docker_files/02_dev
    schedule:
      interval: weekly
    groups:
      docker-minor-and-patch:
        update-types: [minor, patch]
