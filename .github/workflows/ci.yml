# Runs on every push: lint (ruff + codespell + prettier + djLint + eslint), security
# audits (pip-audit + npm audit + zizmor, all free; PRs also get a dependency
# review), and the pytest suite (API tests + Playwright E2E against a live
# uvicorn server).
#
# Everything installs at locked versions - python packages from uv.lock, npm
# tools from package-lock.json - the same single sources of truth the
# devcontainer images bake in. Actions are pinned to commit SHAs because tags
# are movable; Dependabot keeps the SHAs, lockfiles and base images current
# (see .github/dependabot.yml).
name: CI

# push covers work on branches in this repo; pull_request additionally covers
# PRs from forks (which never trigger push events here). Limiting push to main
# avoids double runs on same-repo PR branches. merge_group makes the required
# checks run if a repo built from this template enables GitHub's merge queue -
# without it, queued merges would wait forever for checks that never start.
on:
  push:
    branches: [main]
  pull_request:
  merge_group:

# a newer push to the same branch supersedes any run still in flight
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# CI only reads the repo - grant the workflow token the minimum permissions
permissions:
  contents: read

env:
  # Without this, every `uv run` implicitly syncs the default (dev) dependency
  # group first, silently undoing the lint job's `--only-group lint` install.
  # The explicit `uv sync` steps are the only installs.
  UV_NO_SYNC: "1"

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # don't leave the workflow token in .git/config for later steps
          persist-credentials: false
      # python-version-file: requires-python in pyproject.toml is the single
      # source of truth for the Python line
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version-file: pyproject.toml
      # enable-cache keys uv's cache on uv.lock
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
      - name: Install lint tools
        run: uv sync --locked --only-group lint
      - name: Ruff lint
        run: uv run ruff check .
      - name: Ruff format check
        run: uv run ruff format --check .
      # skip list comes from [tool.codespell] in pyproject.toml
      - name: Codespell
        run: uv run codespell .
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          # engines.node in package.json is the single source of truth for the
          # Node major (the dev image copies node from an image pinned to the
          # same major - tests/test_node_version_consistency.py ties the two)
          node-version-file: package.json
          cache: npm
      # exact tool versions from package-lock.json
      - name: Install npm tools
        run: npm ci
      # prettier@3 respects .gitignore, so caches/node_modules are excluded
      - name: Prettier check
        run: npx prettier --check .
      - name: djLint lint
        run: uv run djlint src/app/templates --lint
      - name: djLint format check
        run: uv run djlint src/app/templates --check
      - name: ESLint
        run: npx eslint .
      # globs and rule tweaks live in .markdownlint-cli2.jsonc
      - name: Markdownlint
        run: npx markdownlint-cli2
      # ---- security audits -----------------------------------------------
      # Dependabot keeps the pins current; these steps fail the build when a
      # *currently pinned* dependency has a known vulnerability. audit.yml
      # re-runs the same audits on a weekly schedule, so advisories published
      # between pushes still surface - keep the two lists in sync.
      # npm audit checks package-lock.json against the npm advisory database.
      - name: npm audit
        run: npm audit --audit-level=high
      # pip-audit checks the locked python packages against the PyPA advisory
      # database. uv export flattens uv.lock into the requirements format
      # pip-audit understands; the export includes hashes, which is what lets
      # --disable-pip resolve the audit without a pip installation step.
      - name: pip-audit
        run: |
          uv export --format requirements-txt --all-groups --no-emit-project \
            --output-file "$RUNNER_TEMP/requirements.txt"
          uv run pip-audit --disable-pip -r "$RUNNER_TEMP/requirements.txt"
      # zizmor lints the workflows in .github/workflows for security footguns
      # (unpinned actions, credential persistence, template injection, ...).
      # GH_TOKEN only enables its extra online audits - read-only is plenty.
      - name: zizmor
        run: uv run zizmor .github/workflows/
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Blocks PRs that introduce dependencies with known vulnerabilities (same
  # high bar as the npm audit step). Diff-based - it compares the PR against
  # the base - so it only exists on pull_request events.
  # Free for public repos. If you clone/fork this repo and make it PRIVATE,
  # delete this job (or buy GitHub Advanced Security): without GHAS the API
  # this action needs is unavailable on private repos and the job fails.
  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: high

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # don't leave the workflow token in .git/config for later steps
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version-file: pyproject.toml
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
      - name: Install Python deps
        run: uv sync --locked
      # mypy runs here (not in lint) because it needs the runtime deps importable
      - name: Mypy
        run: uv run mypy
      # key the browser cache on the locked Playwright version so a
      # Playwright upgrade can't be paired with a stale browser build
      - name: Compute Playwright cache key
        id: playwright-version
        run: echo "version=$(uv run playwright --version | awk '{print $2}')" >> "$GITHUB_OUTPUT"
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ steps.playwright-version.outputs.version }}
      - name: Install headless Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: uv run playwright install chromium --with-deps
      - name: Install Chromium system deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: uv run playwright install-deps chromium
      # --cov measures coverage of the app package (uvicorn subprocess
      # included) and fails under the threshold - both configured in
      # [tool.coverage.*] in pyproject.toml, the single source of truth
      - name: Run tests
        run: uv run pytest --cov
