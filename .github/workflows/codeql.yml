# CodeQL static analysis of the python backend and the vanilla-JS frontend.
# Findings appear under the repo's Security tab (Code scanning alerts).
#
# Free for PUBLIC repos only. If you clone/fork this repo and make it private,
# delete this workflow (or disable it in the Actions tab) - code scanning on
# private repos requires paid GitHub Advanced Security, and the results upload
# fails without it.
#
# Same pinning rules as ci.yml: actions pinned to commit SHAs, kept current by
# Dependabot.
name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
  # Only matters if a repo built from this template makes CodeQL a required
  # check and enables GitHub's merge queue - same reasoning as in ci.yml.
  merge_group:
  schedule:
    # Weekly re-scan: CodeQL's query packs improve continuously, so unchanged
    # code can grow new findings between pushes.
    - cron: "27 4 * * 1"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# default to nothing; the job grants itself exactly what it needs
permissions: {}

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read # checkout
      security-events: write # upload the analysis results
    strategy:
      fail-fast: false
      matrix:
        language: [python, javascript-typescript]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # don't leave the workflow token in .git/config for later steps
          persist-credentials: false
      - uses: github/codeql-action/init@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          languages: ${{ matrix.language }}
      - uses: github/codeql-action/analyze@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
