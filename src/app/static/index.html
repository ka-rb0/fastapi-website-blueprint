<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="A minimal, modern FastAPI website blueprint with light and dark themes."
    />
    <title>FastAPI Website Blueprint</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <!-- Tints browser chrome to match --bg (hex values mirrored by hand from
         css/theme.css - tests/test_static_consistency.py enforces the match);
         media-scoped, so it follows the OS scheme. An in-page theme override
         doesn't retint the chrome - a deliberate simplicity tradeoff. -->
    <meta
      name="theme-color"
      media="(prefers-color-scheme: light)"
      content="#f5f5fa"
    />
    <meta
      name="theme-color"
      media="(prefers-color-scheme: dark)"
      content="#15151d"
    />
    <link rel="stylesheet" href="css/theme.css" />
    <link rel="stylesheet" href="css/style.css" />
    <!-- Deliberately blocking (no defer/module): re-applies a saved theme
         before first paint so there is no flash. A file, not an inline
         script, because the CSP (see src/app/main.py) bans inline scripts. -->
    <script src="js/theme-init.js"></script>
  </head>
  <body>
    <header>
      <!-- Inside <header> so landmark navigation reaches it; position: fixed
           keeps it out of the flow. aria-pressed is owned by
           js/theme-switch.js: hardcoding it here would be wrong whenever a
           saved choice exists. Auto = follow the OS scheme. Ships hidden -
           without JS the buttons would be dead controls; js/theme-switch.js
           reveals the group once wired. -->
      <div class="theme-switch" role="group" aria-label="Color theme" hidden>
        <button type="button" data-theme-choice="light">Light</button>
        <button type="button" data-theme-choice="auto">Auto</button>
        <button type="button" data-theme-choice="dark">Dark</button>
      </div>
      <h1>FastAPI Website Blueprint</h1>
    </header>

    <main>
      <p class="tagline">A minimal starting point. Build from here.</p>

      <!-- Example API round trip: js/shout.js posts the text to /api/shout
           (pydantic-validated) and renders the uppercased reply below.
           maxlength mirrors MAX_SHOUT_LENGTH in src/app/main.py by hand
           (tests/test_static_consistency.py enforces the match) - the server
           still validates; this only gives instant feedback in the browser. -->
      <form class="shout" id="shout-form">
        <input
          id="shout-input"
          name="text"
          aria-label="Text to shout"
          placeholder="Type something…"
          autocomplete="off"
          maxlength="1000"
          required
        />
        <button type="submit">Shout</button>
        <output for="shout-input" id="shout-output"></output>
      </form>
    </main>

    <!-- One module per feature, each its own script tag: separate module
         graphs, so a failure (or deletion) of one never takes down the
         other. Delete a feature's markup and its tag together. -->
    <script type="module" src="js/theme-switch.js"></script>
    <script type="module" src="js/shout.js"></script>
  </body>
</html>
